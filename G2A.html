<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 2 Spelling Bee Advanced Words Self-Test</title>
  <style>
    :root {
      --gold: #ffd54f;
      --gold-dark: #d9a300;
      --brown: #5d4037;
      --cream: #fff8e1;
      --ink: #2d2d2d;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.45) 0 9px, transparent 10px),
        radial-gradient(circle at 85% 30%, rgba(255,255,255,.35) 0 12px, transparent 13px),
        radial-gradient(circle at 55% 85%, rgba(255,255,255,.35) 0 10px, transparent 11px),
        linear-gradient(135deg, #f9c74f, #f4a261 55%, #e9c46a);
    }
    .app {
      width: min(94vw, 520px);
      background: rgba(255,255,255,.96);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(0,0,0,.18);
      border: 4px solid rgba(93,64,55,.12);
      text-align: center;
    }
    .bee { font-size: 48px; line-height: 1; margin-bottom: 6px; }
    h1 {
      margin: 0;
      font-size: clamp(24px, 6vw, 36px);
      color: var(--brown);
      letter-spacing: .3px;
    }
    .subtitle { margin: 8px 0 18px; color: #6d4c41; font-size: 16px; }
    #wordDisplay {
      min-height: 86px;
      width: 100%;
      margin: 14px auto;
      padding: 18px 12px;
      border-radius: 18px;
      background: var(--cream);
      border: 3px dashed var(--gold-dark);
      font-size: clamp(36px, 9vw, 58px);
      font-weight: 800;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }
    #wordDisplay.empty { color: transparent; }
    #status {
      min-height: 46px;
      margin: 10px auto 16px;
      padding: 10px 12px;
      border-radius: 14px;
      background: #fffde7;
      color: #5f4b32;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .buttons { display: grid; grid-template-columns: 1fr; gap: 10px; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(180deg, var(--gold), var(--gold-dark));
      color: #2b2118;
      box-shadow: 0 6px 0 #a16f00, 0 10px 18px rgba(0,0,0,.14);
      transition: transform .08s ease, box-shadow .08s ease, filter .2s ease;
    }
    button:hover { filter: brightness(1.03); }
    button:active { transform: translateY(4px); box-shadow: 0 2px 0 #a16f00, 0 5px 10px rgba(0,0,0,.13); }
    .secondary { background: linear-gradient(180deg, #fff3bf, #ffd166); }
    .footer { margin-top: 14px; color: #7a6a58; font-size: 13px; }
  </style>
</head>

      <button class="secondary" onclick="checkWord()">Check</button>
      <button onclick="nextWord()">Next</button>
    </section>

    <div class="footer" id="counter">250 advanced words loaded.</div>

    let remainingWords = [];
    let currentWord = "";
    const wordDisplay = document.getElementById('wordDisplay');
    const statusDiv = document.getElementById('status');
    const counterDiv = document.getElementById('counter');

    function updateStatus(message) {
      statusDiv.textContent = message;
    }

    function updateCounter() {
      const done = spellingWords.length - remainingWords.length;
      counterDiv.textContent = `${spellingWords.length} advanced words loaded. Practiced this round: ${Math.max(0, done)} / ${spellingWords.length}.`;
    }

    function chooseWord() {
      if (remainingWords.length === 0) {
        remainingWords = [...spellingWords];
      }
      const index = Math.floor(Math.random() * remainingWords.length);
      currentWord = remainingWords[index];
      remainingWords.splice(index, 1);
      wordDisplay.textContent = "Hidden word";
      wordDisplay.classList.add('empty');
      updateCounter();
    }

    function startOver() {
      remainingWords = [...spellingWords];
      chooseWord();
      speak(currentWord);
      updateStatus("Listen carefully. Use Repeat, Sentence, Check, or Next.");
    }

    function nextWord() {
      chooseWord();
      speak(currentWord);
      updateStatus("New word. Listen carefully.");
    }

    function repeatWord() {
      if (!currentWord) return updateStatus("Press Start first.");
      speak(currentWord);
    }

    function makeSentence(word) {
      return sentences[word] || `Please listen carefully to the spelling bee word: ${word}.`;
    }

    function speakSentence() {
      if (!currentWord) return updateStatus("Press Start first.");
      speak(makeSentence(currentWord));
      updateStatus("Speaking a simple sentence for this word...");
    }

    function checkWord() {
      if (!currentWord) return updateStatus("Press Start first.");
      wordDisplay.textContent = currentWord;
      wordDisplay.classList.remove('empty');
      updateStatus("Check your spelling. If you were correct, press Next.");
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) {
        updateStatus("Speech synthesis is not supported. Try Chrome or Edge.");
        return;
      }
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.85;
      utterance.pitch = 1;
      utterance.volume = 1;
      speechSynthesis.speak(utterance);
    }

    window.addEventListener('load', () => {
      remainingWords = [...spellingWords];
      updateCounter();
    });
