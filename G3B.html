<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 3 Basic Words - Spelling Bee Self-Test Tool</title>
  <style>
    :root {
      --gold: #f7c52f;
      --gold-dark: #e0a800;
      --cream: #fff8dc;
      --text: #1f1f1f;
      --brown: #4b2500;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #ffd84d, #f0b400);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
    }

    .container {
      width: min(520px, 96vw);
      background: rgba(255, 255, 255, 0.94);
      border: 4px solid #ffe46b;
      border-radius: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
      padding: 24px 22px;
      text-align: center;
    }

    h1 {
      margin: 0 0 4px;
      color: var(--brown);
      font-size: clamp(28px, 5vw, 38px);
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #555;
      font-size: 15px;
    }

    #wordDisplay {
      width: 100%;
      min-height: 205px;
      border: 3px solid var(--gold);
      border-radius: 18px;
      background: linear-gradient(180deg, #fffbe8, #fff7d0);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      margin: 10px 0 12px;
      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: normal;
      word-break: normal;
      white-space: nowrap;
      text-align: center;
      color: #1f1f1f;
      box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
      font-size: clamp(34px, 10vw, 68px);
    }

    #wordDisplay.empty {
      color: transparent;
    }

    #sentenceDisplay {
      min-height: 44px;
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #ffffff;
      color: #333;
      font-size: 15px;
      line-height: 1.35;
      box-shadow: 0 4px 14px rgba(0,0,0,0.09);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .button-column {
      display: flex;
      flex-direction: column;
      gap: 11px;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #ffe775, #f6c433);
      box-shadow: 0 8px 14px rgba(0,0,0,0.16);
      color: #111;
      font-size: 21px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 10px 18px rgba(0,0,0,0.18);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 5px 10px rgba(0,0,0,0.14);
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
      font-size: 14px;
      color: #6a4b00;
    }

    .pill {
      padding: 5px 10px;
      border: 1px solid var(--gold-dark);
      border-radius: 999px;
      background: #fff9db;
      font-weight: 700;
    }

    #status {
      color: #555;
      text-align: right;
      flex: 1;
    }

    @media (max-width: 420px) {
      .container {
        padding: 18px 14px;
      }

      #wordDisplay {
        min-height: 180px;
      }

      button {
        font-size: 18px;
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Grade 3 Basic Words</h1>
    <p class="subtitle">Spelling Bee Self-Test Tool</p>

    <div id="wordDisplay" class="empty"></div>
    <div id="sentenceDisplay"></div>

    <div class="button-column">
      <button type="button" onclick="playWord()">Start / Start Over</button>
      <button type="button" onclick="repeatWord()">Repeat</button>
      <button type="button" onclick="speakSentence()">Hear It in a Sentence</button>
      <button type="button" onclick="checkWord()">Check</button>
      <button type="button" onclick="nextWord()">Next</button>
    </div>

    <div class="footer-row">
      <span class="pill">130 words</span>
      <span id="status">Ready</span>
    </div>
  </main>

      "siren": "The siren was loud during the emergency."

    let remainingWords = [...spellingWords];
    let currentWord = "";
    let usedCount = 0;

    const wordDisplay = document.getElementById("wordDisplay");
    const sentenceDisplay = document.getElementById("sentenceDisplay");
    const statusDiv = document.getElementById("status");

    function updateStatus(message) {
      statusDiv.textContent = message;
    }

    function chooseWord() {
      if (!remainingWords.length) {
        remainingWords = [...spellingWords];
        usedCount = 0;
      }

      const index = Math.floor(Math.random() * remainingWords.length);
      currentWord = remainingWords[index];
      remainingWords.splice(index, 1);
      usedCount = spellingWords.length - remainingWords.length;

      wordDisplay.textContent = "";
      wordDisplay.classList.add("empty");
      sentenceDisplay.textContent = "";
      fitWordText();
      updateStatus(`${usedCount} / ${spellingWords.length} used`);
      speakText(currentWord);
    }

    function playWord() {
      remainingWords = [...spellingWords];
      usedCount = 0;
      chooseWord();
    }

    function nextWord() {
      chooseWord();
    }

    function repeatWord() {
      if (!currentWord) {
        updateStatus("Please start first.");
        return;
      }
      speakText(currentWord);
    }

    function maskSentence(sentence, word) {
      if (!sentence || !word) return "";
      const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      const regex = new RegExp(escaped, "gi");
      return sentence.replace(regex, "?????");
    }

    function speakSentence() {
      if (!currentWord) {
        updateStatus("Please start first.");
        return;
      }

      const sentence = sentences[currentWord] || `This sentence uses the word ${currentWord}.`;
      sentenceDisplay.textContent = maskSentence(sentence, currentWord);
      speakText(sentence);
    }

    function checkWord() {
      if (!currentWord) {
        updateStatus("Please start first.");
        return;
      }

      wordDisplay.textContent = currentWord;
      wordDisplay.classList.remove("empty");
      sentenceDisplay.textContent = sentences[currentWord] || "";
      fitWordText();
      updateStatus("Check your spelling.");
    }

    function speakText(text) {
      if (!("speechSynthesis" in window)) {
        updateStatus("Speech synthesis is not supported in this browser.");
        return;
      }

      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.88;
      utterance.pitch = 1;
      utterance.volume = 1;
      speechSynthesis.speak(utterance);
    }

    function fitWordText() {
      const box = wordDisplay;
      if (!box.textContent.trim()) return;

      let size = 68;
      const minSize = 28;
      box.style.fontSize = size + "px";

      requestAnimationFrame(() => {
        while (box.scrollWidth > box.clientWidth - 8 && size > minSize) {
          size -= 2;
          box.style.fontSize = size + "px";
        }
      });
    }

    window.addEventListener("resize", fitWordText);
    window.addEventListener("load", () => {
      updateStatus(`0 / ${spellingWords.length} used`);
    });
  </script>
</body>
</html>
